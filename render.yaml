services:
  - type: web
    name: sibbu-healthcare-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 8 --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: SESSION_COOKIE_SECURE
        value: "true"
