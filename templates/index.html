<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Healthcare Assistant</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="sidebar">
    <h2>🩺 HealthBot</h2>
    <button id="clear-btn" type="button">Clear Chat</button>
    <div class="history" id="history" aria-live="polite"></div>
  </div>

  <div class="main">
    <div class="disclaimer">
      ⚠️ {{ disclaimer }}
    </div>

    <div class="chat-box" id="chat-box" aria-live="polite">
      <div class="message bot">👩‍⚕️ Hello! I'm your healthcare assistant. How can I help you today?</div>
    </div>

    <div id="error-banner" class="error-banner" role="alert" hidden></div>

    <form class="input-area" id="chat-form">
      <input
        type="text"
        id="user-input"
        placeholder="Type your message..."
        maxlength="2000"
        autocomplete="off"
        aria-label="Type your message"
      />
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
